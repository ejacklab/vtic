# Stage 2: CRUD Operations - Tickets
# Canonical reference extracted from openapi.yaml

paths:
  /tickets:
    get:
      tags: [Tickets]
      summary: List tickets
      operationId: listTickets
      parameters:
        - $ref: '#/components/parameters/severityFilter'
        - $ref: '#/components/parameters/statusFilter'
        - $ref: '#/components/parameters/categoryFilter'
        - $ref: '#/components/parameters/repoFilter'
        - name: assignee
          in: query
          schema:
            type: string
        - name: tags
          in: query
          schema:
            type: array
            items:
              type: string
          style: form
          explode: false
        - name: created_after
          in: query
          schema:
            type: string
            format: date-time
        - name: created_before
          in: query
          schema:
            type: string
            format: date-time
        - $ref: '#/components/parameters/sortParam'
        - $ref: '#/components/parameters/limitParam'
        - $ref: '#/components/parameters/offsetParam'
        - $ref: '#/components/parameters/formatParam'
      responses:
        '200':
          description: Successfully retrieved list of tickets
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TicketListResponse'
    post:
      tags: [Tickets]
      summary: Create ticket
      operationId: createTicket
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TicketCreate'
      responses:
        '201':
          description: Ticket successfully created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TicketResponse'

  /tickets/{ticket_id}:
    get:
      tags: [Tickets]
      summary: Get ticket
      operationId: getTicket
      parameters:
        - $ref: '#/components/parameters/ticketIdParam'
        - $ref: '#/components/parameters/formatParam'
      responses:
        '200':
          description: Successfully retrieved ticket
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TicketResponse'
    patch:
      tags: [Tickets]
      summary: Update ticket
      operationId: updateTicket
      parameters:
        - $ref: '#/components/parameters/ticketIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TicketUpdate'
      responses:
        '200':
          description: Ticket successfully updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TicketResponse'
    delete:
      tags: [Tickets]
      summary: Delete ticket
      operationId: deleteTicket
      parameters:
        - $ref: '#/components/parameters/ticketIdParam'
        - name: force
          in: query
          schema:
            type: boolean
            default: false
        - $ref: '#/components/parameters/dryRunParam'
      responses:
        '200':
          description: Ticket successfully deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TicketResponse'

  /tickets/batch:
    post:
      tags: [Tickets]
      summary: Fetch multiple tickets by ID
      operationId: batchGetTickets
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BatchGetRequest'
      responses:
        '200':
          description: Tickets found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BatchGetResponse'

components:
  parameters:
    ticketIdParam:
      name: ticket_id
      in: path
      required: true
      schema:
        type: string
        pattern: ^[CFGHST]\d+$
    limitParam:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    offsetParam:
      name: offset
      in: query
      schema:
        type: integer
        minimum: 0
        default: 0
    formatParam:
      name: format
      in: query
      schema:
        type: string
        enum: [json, markdown, yaml, csv]
        default: json
    sortParam:
      name: sort
      in: query
      schema:
        type: string
        default: -created
        enum: [created, -created, updated, -updated, severity, -severity, title, -title, status, -status]
    dryRunParam:
      name: dry_run
      in: query
      schema:
        type: boolean
        default: false
    severityFilter:
      name: severity
      in: query
      schema:
        type: array
        items:
          $ref: '#/components/schemas/Severity'
      style: form
      explode: false
    statusFilter:
      name: status
      in: query
      schema:
        type: array
        items:
          $ref: '#/components/schemas/Status'
      style: form
      explode: false
    categoryFilter:
      name: category
      in: query
      schema:
        type: array
        items:
          $ref: '#/components/schemas/Category'
      style: form
      explode: false
    repoFilter:
      name: repo
      in: query
      schema:
        type: array
        items:
          type: string
      style: form

  schemas:
    Category:
      type: string
      enum: [crash, hotfix, feature, security, general]

    Severity:
      type: string
      enum: [critical, high, medium, low, info]

    Status:
      type: string
      enum: [open, in_progress, blocked, fixed, wont_fix, closed]

    Ticket:
      type: object
      required: [id, title, description, repo, category, severity, status, created, updated]
      properties:
        id:
          type: string
          pattern: ^[CFGHST]\d+$
        slug:
          type: string
        title:
          type: string
          minLength: 1
          maxLength: 200
        description:
          type: string
          minLength: 1
        repo:
          type: string
          pattern: ^[a-zA-Z0-9_.-]+/[a-zA-Z0-9_.-]+$
        category:
          $ref: '#/components/schemas/Category'
        severity:
          $ref: '#/components/schemas/Severity'
        status:
          $ref: '#/components/schemas/Status'
        assignee:
          type: [string, 'null']
        fix:
          type: [string, 'null']
        tags:
          type: array
          items:
            type: string
            maxLength: 50
          maxItems: 20
        references:
          type: array
          items:
            type: string
            pattern: ^[CFGHST]\d+$
        created:
          type: string
          format: date-time
        updated:
          type: string
          format: date-time

    TicketCreate:
      type: object
      required: [title, description, repo]
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 200
        description:
          type: string
          minLength: 1
        repo:
          type: string
          pattern: ^[a-zA-Z0-9_.-]+/[a-zA-Z0-9_.-]+$
        category:
          $ref: '#/components/schemas/Category'
        severity:
          $ref: '#/components/schemas/Severity'
        status:
          $ref: '#/components/schemas/Status'
        assignee:
          type: [string, 'null']
        tags:
          type: array
          items:
            type: string
            maxLength: 50
          maxItems: 20
        references:
          type: array
          items:
            type: string
            pattern: ^[CFGHST]\d+$

    TicketUpdate:
      type: object
      properties:
        title:
          type: [string, 'null']
          minLength: 1
          maxLength: 200
        description:
          type: [string, 'null']
        description_append:
          type: [string, 'null']
        category:
          oneOf:
            - $ref: '#/components/schemas/Category'
            - type: 'null'
        severity:
          oneOf:
            - $ref: '#/components/schemas/Severity'
            - type: 'null'
        status:
          oneOf:
            - $ref: '#/components/schemas/Status'
            - type: 'null'
        assignee:
          type: [string, 'null']
        fix:
          type: [string, 'null']
        tags:
          type: [array, 'null']
          items:
            type: string
            maxLength: 50
        references:
          type: [array, 'null']
          items:
            type: string
            pattern: ^[CFGHST]\d+$

    TicketSummary:
      type: object
      required: [id, title, severity, status, repo, category, created]
      properties:
        id:
          type: string
        title:
          type: string
        severity:
          $ref: '#/components/schemas/Severity'
        status:
          $ref: '#/components/schemas/Status'
        repo:
          type: string
        category:
          $ref: '#/components/schemas/Category'
        assignee:
          type: [string, 'null']
        created:
          type: string
          format: date-time
        updated:
          type: string
          format: date-time

    TicketResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/Ticket'
        meta:
          type: object
          properties:
            request_id:
              type: string
            warnings:
              type: array
              items:
                type: string

    TicketListResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/TicketSummary'
        meta:
          type: object
          required: [total, limit, offset, has_more]
          properties:
            total:
              type: integer
            limit:
              type: integer
            offset:
              type: integer
            has_more:
              type: boolean
            request_id:
              type: string

    BatchGetRequest:
      type: object
      required: [ids]
      properties:
        ids:
          type: array
          items:
            type: string
            pattern: ^[CFGHST]\d+$
          minItems: 1
          maxItems: 100
        fields:
          type: [array, 'null']
          items:
            type: string

    BatchGetResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Ticket'
        meta:
          type: object
          required: [requested, found, missing]
          properties:
            requested:
              type: integer
            found:
              type: integer
            missing:
              type: array
              items:
                type: string
            request_id:
              type: string
