# OpenAPI 3.1.1 — vtic API
# Generated: 2026-03-17
# Spec reference: https://swagger.io/specification/

$schema: https://spec.openapis.org/oas/3.1.0
openapi: 3.1.1
info:
  title: vtic API
  version: 0.1.0
  description: 'vtic is a Python-native, AI-first, open-source ticketing system.

    Provides CRUD operations, hybrid BM25+semantic search via ZVec,

    REST API, and CLI interface.

    '
  contact:
    name: EJack Yao
    url: https://ejai.ai
    email: dev@ejai.ai
  license:
    name: MIT
    identifier: MIT
servers:
- url: http://localhost:8080/api/v1
  description: Local development
- url: http://{host}:{port}/api/v1
  description: Self-hosted
  variables:
    host:
      default: localhost
      description: Server hostname
    port:
      default: '8080'
      description: Server port
tags:
- name: Tickets
  description: Ticket lifecycle management (CRUD)
- name: Search
  description: Hybrid BM25 + semantic search
- name: Management
  description: Index, config, stats, and diagnostics
- name: Bulk
  description: Batch create, update, delete operations
- name: Import/Export
  description: Data portability
- name: System
  description: Health checks and OpenAPI spec
paths:
  /config:
    get:
      summary: Get configuration
      description: Retrieve the current system configuration.
      operationId: getConfig
      tags:
      - Management
      responses:
        '200':
          description: Current configuration
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfigResponse'
    patch:
      summary: Update configuration
      description: Update configuration settings. Only provided fields are modified (partial update).
      operationId: updateConfig
      tags:
      - Management
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConfigResponse'
      responses:
        '200':
          description: Updated configuration
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfigResponse'
        '400':
          description: Invalid configuration values
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /doctor:
    get:
      tags:
      - Management
      summary: Run diagnostic checks
      description: 'Comprehensive system diagnostics including index health, configuration

        validation, file permissions, and embedding provider connectivity.

        Returns suggested fixes for any detected issues.

        '
      operationId: runDiagnostics
      responses:
        '200':
          description: Diagnostic results
          content:
            application/json:
              schema:
                $ref: stage1-foundation.yaml#/components/schemas/DoctorResult
              examples:
                all_ok:
                  summary: All checks passed
                  value:
                    overall: ok
                    checks:
                    - name: zvec_index
                      status: ok
                      message: Index is healthy with 82 tickets
                      fix: null
                    - name: config_file
                      status: ok
                      message: Configuration valid
                      fix: null
                    - name: embedding_provider
                      status: ok
                      message: Local provider using all-MiniLM-L6-v2
                      fix: null
                    - name: file_permissions
                      status: ok
                      message: All directories writable
                      fix: null
                with_warnings:
                  summary: Warnings detected
                  value:
                    overall: warnings
                    checks:
                    - name: zvec_index
                      status: ok
                      message: Index is healthy
                      fix: null
                    - name: config_file
                      status: warning
                      message: Using deprecated config key 'embeddings.provider'
                      fix: Update to 'embeddings.provider' in vtic.toml
                    - name: embedding_provider
                      status: warning
                      message: No embedding provider configured - semantic search disabled
                      fix: Set embeddings.provider = 'local' in vtic.toml
                with_errors:
                  summary: Errors detected
                  value:
                    overall: errors
                    checks:
                    - name: zvec_index
                      status: error
                      message: Index file corrupted or missing
                      fix: Run 'vtic reindex' to rebuild the index
                    - name: config_file
                      status: ok
                      message: Configuration valid
                      fix: null
                    - name: file_permissions
                      status: error
                      message: Cannot write to tickets directory
                      fix: Check permissions on ./tickets/ directory
  /export:
    get:
      summary: Export tickets
      description: Export tickets in various formats. Supports filtering via query parameters.
      operationId: exportTickets
      tags:
      - Import/Export
      parameters:
      - name: format
        in: query
        schema:
          type: string
          enum:
          - json
          - jsonl
          - csv
          - markdown
          - tar.gz
          default: json
        description: Export format
      - name: severity
        in: query
        schema:
          type: array
          items:
            $ref: '#/components/schemas/Severity'
        style: form
        explode: false
        description: Filter by severity levels
      - name: status
        in: query
        schema:
          type: array
          items:
            $ref: '#/components/schemas/Status'
        style: form
        explode: false
        description: Filter by status values
      - name: category
        in: query
        schema:
          type: array
          items:
            $ref: '#/components/schemas/Category'
        style: form
        explode: false
        description: Filter by category
      - name: repo
        in: query
        schema:
          type: array
          items:
            type: string
        style: form
        explode: false
        description: Filter by repo (supports glob patterns)
      responses:
        '200':
          description: Export file download
          headers:
            Content-Disposition:
              description: Attachment filename
              schema:
                type: string
                examples:
                  value: attachment; filename="vtic-export.json"
          content:
            application/json:
              schema:
                type: string
                format: binary
            text/csv:
              schema:
                type: string
                format: binary
            application/gzip:
              schema:
                type: string
                format: binary
            text/markdown:
              schema:
                type: string
                format: binary
            application/x-ndjson:
              schema:
                type: string
                format: binary
        '400':
          description: Invalid format parameter
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /health:
    get:
      tags:
      - System
      summary: Health check endpoint
      description: 'Returns system health status including index availability,

        embedding provider status, and basic diagnostics.

        Used for monitoring and load balancer health checks.

        '
      operationId: getHealth
      responses:
        '200':
          description: System health status
          content:
            application/json:
              schema:
                $ref: stage1-foundation.yaml#/components/schemas/HealthResponse
              examples:
                healthy:
                  summary: Healthy system
                  value:
                    status: healthy
                    version: 0.1.0
                    uptime_seconds: 86400
                    index_status:
                      zvec: available
                      ticket_count: 82
                      last_reindex: '2026-03-17T08:00:00Z'
                    embedding_provider:
                      name: local
                      model: all-MiniLM-L6-v2
                      dimension: 384
                degraded:
                  summary: Degraded - no embedding provider
                  value:
                    status: degraded
                    version: 0.1.0
                    uptime_seconds: 3600
                    index_status:
                      zvec: available
                      ticket_count: 82
                      last_reindex: '2026-03-17T08:00:00Z'
                    embedding_provider:
                      name: none
                      model: null
                      dimension: null
                unhealthy:
                  summary: Unhealthy - index corrupted
                  value:
                    status: unhealthy
                    version: 0.1.0
                    uptime_seconds: 120
                    index_status:
                      zvec: corrupted
                      ticket_count: 0
                      last_reindex: null
                    embedding_provider:
                      name: none
                      model: null
                      dimension: null
  /import:
    post:
      summary: Import tickets
      description: Import tickets from various sources (JSON, CSV, Markdown, GitHub, Jira).
      operationId: importTickets
      tags:
      - Import/Export
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ImportRequest'
      responses:
        '200':
          description: Import completed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImportResult'
        '400':
          description: Invalid source format
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '413':
          description: Payload too large
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /openapi.json:
    get:
      tags:
      - System
      summary: OpenAPI specification
      description: 'Returns the complete OpenAPI 3.1.1 specification for this API.

        Use for API documentation, client generation, and exploration.

        '
      operationId: getOpenApiSpec
      responses:
        '200':
          description: OpenAPI specification in JSON format
          content:
            application/json:
              schema:
                type: object
                description: The complete OpenAPI 3.1.1 specification
  /reindex:
    post:
      tags:
      - Management
      summary: Rebuild search index
      description: 'Rebuild the Zvec search index from markdown ticket files.

        Can target a single ticket or all tickets. Use force to re-index

        unchanged tickets. Optionally override the embedding provider.

        '
      operationId: reindex
      requestBody:
        required: false
        description: Reindex options
        content:
          application/json:
            schema:
              type: object
              properties:
                ticket_id:
                  type: string
                  pattern: ^[CFGHST]\d+$
                  description: 'Single ticket ID to reindex. If omitted, reindexes all tickets.

                    '
                  examples:
                    single:
                      value: C1
                force:
                  type: boolean
                  default: false
                  description: 'Force reindex even if ticket hasn''t changed (re-embeds content).

                    '
                provider:
                  type: string
                  description: 'Override embedding provider for this reindex operation.

                    One of: local, openai, custom, none.

                    '
                  enum:
                  - local
                  - openai
                  - custom
                  - none
            examples:
              all:
                summary: Reindex all tickets
                value: {}
              single:
                summary: Reindex single ticket
                value:
                  ticket_id: C1
              force_reembed:
                summary: Force re-embed all tickets
                value:
                  force: true
              override_provider:
                summary: Use different embedding provider
                value:
                  provider: openai
                  force: true
      responses:
        '200':
          description: Reindex completed successfully
          content:
            application/json:
              schema:
                $ref: stage1-foundation.yaml#/components/schemas/ReindexResult
              examples:
                success:
                  summary: Successful reindex
                  value:
                    processed: 80
                    skipped: 2
                    failed: 0
                    duration_ms: 12340
                    errors: []
                with_errors:
                  summary: Reindex with some failures
                  value:
                    processed: 78
                    skipped: 2
                    failed: 2
                    duration_ms: 14500
                    errors:
                    - ticket_id: C15
                      message: 'Failed to generate embedding: API timeout'
                    - ticket_id: H3
                      message: Invalid markdown format in frontmatter
  /search:
    post:
      tags:
      - Search
      summary: Hybrid search for tickets
      description: 'Perform hybrid BM25 + semantic search across all tickets.

        Returns ranked results with relevance scores. Use filters to narrow results

        by severity, status, category, repo, or date ranges.

        '
      operationId: searchTickets
      parameters:
      - $ref: stage1-foundation.yaml#/components/parameters/explainParam
      requestBody:
        required: true
        description: Search query with optional filters and pagination
        content:
          application/json:
            schema:
              $ref: stage1-foundation.yaml#/components/schemas/SearchQuery
            examples:
              basic:
                summary: Basic keyword search
                value:
                  query: CORS authentication error
              semantic:
                summary: Semantic search enabled
                value:
                  query: login issues after password change
                  semantic: true
                  limit: 10
              filtered:
                summary: Search with filters
                value:
                  query: API timeout
                  filters:
                    severity:
                    - critical
                    - high
                    status:
                    - open
                    - in_progress
                    repo:
                    - ejacklab/open-dsearch
                  limit: 20
                  offset: 0
      responses:
        '200':
          description: Search completed successfully
          content:
            application/json:
              schema:
                $ref: stage1-foundation.yaml#/components/schemas/SearchResult
              examples:
                results:
                  summary: Search results with hits
                  value:
                    query: authentication failure
                    hits:
                    - ticket_id: C1
                      score: 0.89
                      source: hybrid
                      highlight: The API allows wildcard CORS origins...
                    - ticket_id: C5
                      score: 0.72
                      source: hybrid
                      highlight: Authentication fails after password reset...
                    total: 15
                    meta:
                      bm25_weight: 0.6
                      semantic_weight: 0.4
                      latency_ms: 45
                      semantic_used: true
        '400':
          description: Invalid request - empty or missing query
          content:
            application/json:
              schema:
                $ref: stage1-foundation.yaml#/components/schemas/ErrorResponse
              examples:
                empty_query:
                  summary: Empty query string
                  value:
                    error:
                      code: VALIDATION_ERROR
                      message: Query string cannot be empty
                      details:
                      - field: query
                        message: Required field is missing or empty
        '503':
          description: Semantic search requested but no embedding provider configured
          content:
            application/json:
              schema:
                $ref: stage1-foundation.yaml#/components/schemas/ErrorResponse
              examples:
                no_provider:
                  summary: No embedding provider available
                  value:
                    error:
                      code: SERVICE_UNAVAILABLE
                      message: Semantic search requested but no embedding provider is configured
                      details:
                      - field: semantic
                        message: 'Set ''semantic: false'' or configure an embedding provider'
                      docs: https://vtic.ejai.ai/docs/semantic-search
  /search/suggest:
    get:
      tags:
      - Search
      summary: Get auto-complete suggestions
      description: 'Typeahead suggestions for ticket titles based on partial query input.

        Returns matching ticket titles with counts for building autocomplete UI.

        '
      operationId: suggestSearch
      parameters:
      - name: q
        in: query
        required: true
        description: Partial query string (minimum 2 characters)
        schema:
          type: string
          minLength: 2
          maxLength: 100
        examples:
          partial:
            value: cors
      - name: limit
        in: query
        required: false
        description: Maximum number of suggestions to return
        schema:
          type: integer
          minimum: 1
          maximum: 20
          default: 5
        examples:
          default:
            value: 5
      responses:
        '200':
          description: Suggestions retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required:
                  - suggestion
                  - ticket_count
                  properties:
                    suggestion:
                      type: string
                      description: Suggested ticket title or phrase
                    ticket_count:
                      type: integer
                      description: Number of tickets matching this suggestion
              examples:
                suggestions:
                  summary: Autocomplete suggestions
                  value:
                  - suggestion: CORS wildcard issue
                    ticket_count: 3
                  - suggestion: CORS configuration error
                    ticket_count: 2
                  - suggestion: CORS preflight timeout
                    ticket_count: 1
        '400':
          description: Invalid query parameter
          content:
            application/json:
              schema:
                $ref: stage1-foundation.yaml#/components/schemas/ErrorResponse
              examples:
                too_short:
                  summary: Query too short
                  value:
                    error:
                      code: VALIDATION_ERROR
                      message: Query must be at least 2 characters
  /stats:
    get:
      tags:
      - Management
      summary: Get ticket statistics
      description: 'Aggregate statistics about tickets including counts by status, severity,

        and category. Optionally group by repository.

        '
      operationId: getStats
      parameters:
      - name: by_repo
        in: query
        required: false
        description: Include per-repository breakdown in response
        schema:
          type: boolean
          default: false
      - name: severity
        in: query
        required: false
        description: Filter stats by severity level(s)
        schema:
          type: array
          items:
            $ref: stage1-foundation.yaml#/components/schemas/Severity
        style: form
        explode: false
      - name: status
        in: query
        required: false
        description: Filter stats by status value(s)
        schema:
          type: array
          items:
            $ref: stage1-foundation.yaml#/components/schemas/Status
        style: form
        explode: false
      - name: category
        in: query
        required: false
        description: Filter stats by category(ies)
        schema:
          type: array
          items:
            $ref: stage1-foundation.yaml#/components/schemas/Category
        style: form
        explode: false
      responses:
        '200':
          description: Statistics retrieved successfully
          content:
            application/json:
              schema:
                $ref: stage1-foundation.yaml#/components/schemas/StatsResponse
              examples:
                basic:
                  summary: Basic statistics
                  value:
                    totals:
                      all: 82
                      open: 23
                      closed: 59
                    by_status:
                      open: 15
                      in_progress: 8
                      blocked: 2
                      fixed: 42
                      wont_fix: 3
                      closed: 12
                    by_severity:
                      critical: 2
                      high: 10
                      medium: 35
                      low: 25
                      info: 10
                    by_category:
                      crash: 8
                      hotfix: 5
                      feature: 22
                      security: 12
                      general: 35
                    by_repo: null
                with_repos:
                  summary: Statistics with repo breakdown
                  value:
                    totals:
                      all: 82
                      open: 23
                      closed: 59
                    by_status:
                      open: 15
                      in_progress: 8
                      fixed: 42
                    by_severity:
                      critical: 2
                      high: 10
                      medium: 35
                    by_category:
                      crash: 8
                      hotfix: 5
                      feature: 22
                    by_repo:
                      ejacklab/open-dsearch: 45
                      ejacklab/vtic: 25
                      ejacklab/zvec: 12
  /tickets:
    get:
      summary: List tickets
      description: 'Retrieve a paginated list of tickets with optional filtering.

        Supports filtering by severity, status, category, repo, assignee, tags,

        and date ranges. Results can be sorted and paginated.

        '
      operationId: listTickets
      tags:
      - Tickets
      parameters:
      - $ref: '#/components/parameters/severityFilter'
      - $ref: '#/components/parameters/statusFilter'
      - $ref: '#/components/parameters/categoryFilter'
      - $ref: '#/components/parameters/repoFilter'
      - name: assignee
        in: query
        schema:
          type: string
        description: Filter by assignee username
      - name: tags
        in: query
        schema:
          type: array
          items:
            type: string
        style: form
        explode: false
        description: Filter by tags (ticket must have ALL specified tags)
      - name: created_after
        in: query
        schema:
          type: string
          format: date-time
        description: Filter tickets created after this timestamp (ISO 8601)
      - name: created_before
        in: query
        schema:
          type: string
          format: date-time
        description: Filter tickets created before this timestamp (ISO 8601)
      - $ref: '#/components/parameters/sortParam'
      - $ref: '#/components/parameters/limitParam'
      - $ref: '#/components/parameters/offsetParam'
      - $ref: '#/components/parameters/formatParam'
      responses:
        '200':
          description: Successfully retrieved list of tickets
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TicketListResponse'
        '400':
          description: Invalid filter parameters provided
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      summary: Create ticket
      description: 'Create a new ticket with the provided data. The ticket ID will be

        auto-generated based on the category (e.g., C1 for crash, F1 for feature).

        Timestamps are automatically set for created and updated fields.

        '
      operationId: createTicket
      tags:
      - Tickets
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TicketCreate'
      responses:
        '201':
          description: Ticket successfully created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TicketResponse'
        '400':
          description: Validation failure - missing or invalid fields
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Duplicate ID - ticket with this ID already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error during ticket creation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /tickets/bulk:
    post:
      summary: Bulk create tickets
      description: Create multiple tickets in a single request. Supports dry-run mode for validation.
      operationId: bulkCreateTickets
      tags:
      - Bulk
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BulkCreateRequest'
      responses:
        '200':
          description: Bulk creation completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BulkOperationResult'
        '400':
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    patch:
      summary: Bulk update tickets
      description: Update multiple tickets matching the provided filters.
      operationId: bulkUpdateTickets
      tags:
      - Bulk
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BulkUpdateRequest'
      responses:
        '200':
          description: Bulk update completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BulkOperationResult'
        '400':
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: No tickets matched the provided filters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      summary: Bulk delete tickets
      description: Delete multiple tickets matching the provided filters. By default, moves to trash (soft delete).
      operationId: bulkDeleteTickets
      tags:
      - Bulk
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BulkDeleteRequest'
      responses:
        '200':
          description: Bulk deletion completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BulkOperationResult'
        '400':
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /tickets/{ticket_id}:
    get:
      summary: Get ticket
      description: 'Retrieve a single ticket by its ID. Returns the complete ticket

        with all fields including description, tags, and references.

        '
      operationId: getTicket
      tags:
      - Tickets
      parameters:
      - $ref: '#/components/parameters/ticketIdParam'
      - $ref: '#/components/parameters/formatParam'
      responses:
        '200':
          description: Successfully retrieved ticket
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TicketResponse'
            text/markdown:
              schema:
                type: string
              description: Raw markdown content when format=markdown
        '404':
          description: Ticket not found - no ticket exists with this ID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    patch:
      summary: Update ticket
      description: 'Partially update a ticket. Only include fields that need to be changed.

        The updated timestamp is automatically refreshed. If workflow is

        configured, invalid status transitions will be rejected.

        '
      operationId: updateTicket
      tags:
      - Tickets
      parameters:
      - $ref: '#/components/parameters/ticketIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TicketUpdate'
      responses:
        '200':
          description: Ticket successfully updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TicketResponse'
        '400':
          description: Validation error - invalid field values
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Ticket not found - no ticket exists with this ID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Invalid status transition - violates configured workflow
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      summary: Delete ticket
      description: 'Delete a ticket. By default, performs a soft delete (marks as deleted

        but retains data). Use force=true for permanent deletion. Use dry_run

        to preview the deletion without actually removing the ticket.

        '
      operationId: deleteTicket
      tags:
      - Tickets
      parameters:
      - $ref: '#/components/parameters/ticketIdParam'
      - name: force
        in: query
        schema:
          type: boolean
          default: false
        description: Force permanent deletion (hard delete) instead of soft delete
      - $ref: '#/components/parameters/dryRunParam'
      responses:
        '200':
          description: Ticket successfully deleted (soft-deleted ticket data returned)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TicketResponse'
        '404':
          description: Ticket not found - no ticket exists with this ID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /trash:
    get:
      summary: List trashed tickets
      description: List soft-deleted tickets with pagination.
      operationId: listTrash
      tags:
      - Management
      parameters:
      - name: limit
        in: query
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 20
        description: Max results per page
      - name: offset
        in: query
        schema:
          type: integer
          minimum: 0
          default: 0
        description: Pagination offset
      responses:
        '200':
          description: Paginated list of trashed tickets
          content:
            application/json:
              schema:
                type: object
                required:
                - data
                - meta
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/TicketSummary'
                  meta:
                    type: object
                    required:
                    - total
                    - limit
                    - offset
                    - has_more
                    properties:
                      total:
                        type: integer
                      limit:
                        type: integer
                      offset:
                        type: integer
                      has_more:
                        type: boolean
  /trash/clean:
    delete:
      summary: Purge old trash
      description: Permanently delete tickets from trash older than specified days.
      operationId: cleanTrash
      tags:
      - Management
      parameters:
      - name: older_than_days
        in: query
        schema:
          type: integer
          minimum: 1
          default: 30
        description: Delete tickets older than this many days
      responses:
        '200':
          description: Purge completed
          content:
            application/json:
              schema:
                type: object
                required:
                - purged
                properties:
                  purged:
                    type: integer
                    description: Number of tickets permanently deleted
  /trash/{ticket_id}/restore:
    post:
      summary: Restore trashed ticket
      description: Restore a soft-deleted ticket to its original state.
      operationId: restoreTicket
      tags:
      - Management
      parameters:
      - name: ticket_id
        in: path
        required: true
        schema:
          type: string
          pattern: ^[CFGHST]\d+$
        description: Ticket identifier (category prefix + number)
      responses:
        '200':
          description: Restored ticket
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TicketResponse'
        '404':
          description: Ticket not found in trash
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /validate:
    get:
      tags:
      - Management
      summary: Validate all ticket files
      description: 'Validates all ticket markdown files for correct format, required fields,

        and data integrity. Returns count of valid/invalid tickets with

        detailed error messages for any issues found.

        '
      operationId: validateTickets
      responses:
        '200':
          description: Validation results
          content:
            application/json:
              schema:
                type: object
                required:
                - total
                - valid
                - invalid
                - errors
                properties:
                  total:
                    type: integer
                    description: Total number of tickets validated
                  valid:
                    type: integer
                    description: Number of tickets that passed validation
                  invalid:
                    type: integer
                    description: Number of tickets with validation errors
                  errors:
                    type: array
                    description: List of validation errors by ticket
                    items:
                      type: object
                      required:
                      - ticket_id
                      - errors
                      properties:
                        ticket_id:
                          type: string
                          description: ID of the ticket with errors
                        errors:
                          type: array
                          description: List of validation error messages
                          items:
                            type: string
              examples:
                all_valid:
                  summary: All tickets valid
                  value:
                    total: 82
                    valid: 82
                    invalid: 0
                    errors: []
                with_errors:
                  summary: Some tickets have errors
                  value:
                    total: 82
                    valid: 79
                    invalid: 3
                    errors:
                    - ticket_id: C15
                      errors:
                      - 'Missing required field: repo'
                      - 'Invalid severity value: ''urgent'' (must be one of: critical, high, medium, low, info)'
                    - ticket_id: H3
                      errors:
                      - 'Invalid date format in ''created'': expected ISO 8601'
                    - ticket_id: F22
                      errors:
                      - Title exceeds maximum length of 200 characters
components:
  schemas:
    Category:
      type: string
      enum:
      - crash
      - hotfix
      - feature
      - security
      - general
      description: 'Ticket category determines the ID prefix:

        crash→C, hotfix→H, feature→F, security→S, general→G

        '
      examples:
        security:
          value: security
        general:
          value: general
    Severity:
      type: string
      enum:
      - critical
      - high
      - medium
      - low
      - info
      description: Impact level of the ticket
      examples:
        critical:
          value: critical
        medium:
          value: medium
    Status:
      type: string
      enum:
      - open
      - in_progress
      - blocked
      - fixed
      - wont_fix
      - closed
      description: Current status in the ticket lifecycle
      examples:
        open:
          value: open
        fixed:
          value: fixed
    Ticket:
      type: object
      description: Full ticket representation
      required:
      - id
      - title
      - description
      - repo
      - category
      - severity
      - status
      - created
      - updated
      properties:
        id:
          type: string
          pattern: ^[CFGHST]\d+$
          description: Human-readable ID (e.g., C1, H5, F12, S3, G8)
          examples:
            value: C1
        slug:
          type: string
          pattern: ^[a-z0-9][a-z0-9-]{0,78}[a-z0-9]$
          description: URL-safe slug derived from title
          examples:
            value: cors-wildcard-issue
        title:
          type: string
          minLength: 1
          maxLength: 200
          description: Ticket title
          examples:
            value: CORS Wildcard Issue
        description:
          type: string
          minLength: 1
          description: Full ticket description (markdown supported)
          examples:
            value: The API allows wildcard CORS origins in production...
        repo:
          type: string
          pattern: ^[a-zA-Z0-9_.-]+/[a-zA-Z0-9_.-]+$
          description: Repository in owner/repo format
          examples:
            value: ejacklab/open-dsearch
        category:
          $ref: '#/components/schemas/Category'
        severity:
          $ref: '#/components/schemas/Severity'
        status:
          $ref: '#/components/schemas/Status'
        assignee:
          type:
          - string
          - 'null'
          description: Assigned team member username
          examples:
            value: ejack
        fix:
          type:
          - string
          - 'null'
          description: Resolution details (set when status becomes fixed)
          examples:
            value: Updated Access-Control-Allow-Origin to domain whitelist
        tags:
          type: array
          items:
            type: string
            maxLength: 50
          maxItems: 20
          description: Labels for categorization
          examples:
            value:
            - cors
            - security
            - api
        references:
          type: array
          items:
            type: string
            pattern: ^[CFGHST]\d+$
          description: Related ticket IDs
          examples:
            value:
            - C2
            - C3
        created:
          type: string
          format: date-time
          description: ISO 8601 creation timestamp
          examples:
            value: '2026-03-17T09:00:00Z'
        updated:
          type: string
          format: date-time
          description: ISO 8601 last update timestamp
          examples:
            value: '2026-03-17T14:30:00Z'
    TicketCreate:
      type: object
      description: Request body for creating a new ticket
      required:
      - title
      - description
      - repo
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 200
          description: Ticket title
          examples:
            value: CORS Wildcard Issue
        description:
          type: string
          minLength: 1
          description: Full ticket description
          examples:
            value: The API allows wildcard CORS origins in production...
        repo:
          type: string
          pattern: ^[a-zA-Z0-9_.-]+/[a-zA-Z0-9_.-]+$
          description: Repository in owner/repo format
          examples:
            value: ejacklab/open-dsearch
        category:
          $ref: '#/components/schemas/Category'
        severity:
          $ref: '#/components/schemas/Severity'
        status:
          $ref: '#/components/schemas/Status'
        assignee:
          type:
          - string
          - 'null'
          description: Assigned team member
        tags:
          type: array
          items:
            type: string
            maxLength: 50
          maxItems: 20
          description: Labels
        references:
          type: array
          items:
            type: string
            pattern: ^[CFGHST]\d+$
          description: Related ticket IDs
    TicketUpdate:
      type: object
      description: Partial update — only include fields to change
      properties:
        title:
          type:
          - string
          - 'null'
          minLength: 1
          maxLength: 200
          description: New title
        description:
          type:
          - string
          - 'null'
          description: New description (replaces entire body)
        description_append:
          type:
          - string
          - 'null'
          description: Text to append to existing description
        category:
          oneOf:
          - $ref: '#/components/schemas/Category'
          - type: 'null'
        severity:
          oneOf:
          - $ref: '#/components/schemas/Severity'
          - type: 'null'
        status:
          oneOf:
          - $ref: '#/components/schemas/Status'
          - type: 'null'
        assignee:
          type:
          - string
          - 'null'
          description: New assignee or null to unassign
        fix:
          type:
          - string
          - 'null'
          description: Resolution details
        tags:
          type:
          - array
          - 'null'
          items:
            type: string
            maxLength: 50
          description: New tag list (replaces existing)
        references:
          type:
          - array
          - 'null'
          items:
            type: string
            pattern: ^[CFGHST]\d+$
          description: Updated related ticket IDs
    TicketSummary:
      type: object
      description: Lightweight ticket for list responses
      required:
      - id
      - title
      - severity
      - status
      - repo
      - category
      - created
      properties:
        id:
          type: string
          examples:
            value: C1
        title:
          type: string
          examples:
            value: CORS Wildcard Issue
        severity:
          $ref: '#/components/schemas/Severity'
        status:
          $ref: '#/components/schemas/Status'
        repo:
          type: string
          examples:
            value: ejacklab/open-dsearch
        category:
          $ref: '#/components/schemas/Category'
        assignee:
          type:
          - string
          - 'null'
        created:
          type: string
          format: date-time
        updated:
          type: string
          format: date-time
    SearchQuery:
      type: object
      description: Search request with hybrid BM25 + semantic options
      required:
      - query
      properties:
        query:
          type: string
          minLength: 1
          maxLength: 500
          description: Search query string
          examples:
            value: authentication failure after password reset
        semantic:
          type: boolean
          default: false
          description: Enable semantic (vector) search in addition to BM25
        filters:
          $ref: '#/components/schemas/FilterSet'
        limit:
          type: integer
          minimum: 1
          maximum: 100
          default: 20
        offset:
          type: integer
          minimum: 0
          default: 0
        sort:
          type: string
          default: -score
          pattern: ^-?[a-zA-Z_]+$
          description: 'Sort field. Prefix with - for descending.

            Default: -score (relevance). Use created, updated, severity for non-search lists.

            '
          examples:
            value: -score
    FilterSet:
      type: object
      description: Query filters applied post-search
      properties:
        severity:
          type:
          - array
          - 'null'
          items:
            $ref: '#/components/schemas/Severity'
          description: Filter by severity levels
        status:
          type:
          - array
          - 'null'
          items:
            $ref: '#/components/schemas/Status'
          description: Filter by status values
        repo:
          type:
          - array
          - 'null'
          items:
            type: string
          description: 'Filter by repo. Supports globs: "ejacklab/*" matches all repos in org.

            '
          examples:
            value:
            - ejacklab/open-dsearch
            - ejacklab/*
        category:
          type:
          - array
          - 'null'
          items:
            $ref: '#/components/schemas/Category'
          description: Filter by category
        assignee:
          type:
          - string
          - 'null'
          description: Filter by assignee username
        tags:
          type:
          - array
          - 'null'
          items:
            type: string
          description: Filter by tags (ticket must have ALL specified tags)
        created_after:
          type:
          - string
          - 'null'
          format: date-time
          description: Tickets created after this timestamp
        created_before:
          type:
          - string
          - 'null'
          format: date-time
          description: Tickets created before this timestamp
        updated_after:
          type:
          - string
          - 'null'
          format: date-time
          description: Tickets updated after this timestamp
    SearchHit:
      type: object
      description: A single search result
      required:
      - ticket_id
      - score
      - source
      properties:
        ticket_id:
          type: string
          description: Matching ticket ID
          examples:
            value: C1
        score:
          type: number
          format: double
          minimum: 0
          description: Fused relevance score (higher = more relevant)
          examples:
            value: 0.034
        source:
          type: string
          enum:
          - bm25
          - semantic
          - hybrid
          description: Which search method produced this ranking
        bm25_score:
          type:
          - number
          - 'null'
          format: double
          description: BM25 score component (only in explain mode)
        semantic_score:
          type:
          - number
          - 'null'
          format: double
          description: Cosine similarity score (only in explain mode)
        highlight:
          type:
          - string
          - 'null'
          description: Best matching snippet from ticket content
          examples:
            value: The API allows wildcard CORS origins...
    SearchResult:
      type: object
      description: Search response with hits and metadata
      required:
      - query
      - hits
      - total
      properties:
        query:
          type: string
          description: The original query string
        hits:
          type: array
          items:
            $ref: '#/components/schemas/SearchHit'
          description: Matching tickets ranked by relevance
        total:
          type: integer
          description: Total matching tickets (before limit/offset)
        meta:
          type: object
          properties:
            bm25_weight:
              type: number
              description: BM25 weight used in fusion
              examples:
                value: 0.6
            semantic_weight:
              type: number
              description: Semantic weight used in fusion
              examples:
                value: 0.4
            latency_ms:
              type: integer
              description: Search execution time in milliseconds
            semantic_used:
              type: boolean
              description: Whether semantic search was active
    TicketResponse:
      type: object
      description: Success envelope for single ticket operations
      required:
      - data
      properties:
        data:
          $ref: '#/components/schemas/Ticket'
        meta:
          type: object
          properties:
            request_id:
              type: string
              description: Unique request identifier for debugging
              examples:
                value: req_abc123
            warnings:
              type: array
              items:
                type: string
              description: Non-fatal warnings
    TicketListResponse:
      type: object
      description: Paginated list of tickets
      required:
      - data
      - meta
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/TicketSummary'
        meta:
          type: object
          required:
          - total
          - limit
          - offset
          - has_more
          properties:
            total:
              type: integer
              description: Total matching tickets
            limit:
              type: integer
              examples:
                value: 20
            offset:
              type: integer
              examples:
                value: 0
            has_more:
              type: boolean
              description: Whether more results exist
            request_id:
              type: string
    ErrorResponse:
      type: object
      description: Error envelope for all error responses
      required:
      - error
      properties:
        error:
          type: object
          required:
          - code
          - message
          properties:
            code:
              type: string
              description: Machine-readable error code (e.g., VALIDATION_ERROR, NOT_FOUND)
              examples:
                value: VALIDATION_ERROR
            message:
              type: string
              description: Human-readable error description
              examples:
                value: 'Missing required field: title'
            details:
              type: array
              items:
                type: object
                properties:
                  field:
                    type: string
                  message:
                    type: string
                  value:
                    type:
                    - string
                    - 'null'
            docs:
              type:
              - string
              - 'null'
              description: Link to error documentation
        meta:
          type: object
          properties:
            request_id:
              type: string
    StatsResponse:
      type: object
      description: Ticket statistics
      required:
      - totals
      - by_status
      - by_severity
      - by_category
      properties:
        totals:
          type: object
          required:
          - all
          - open
          - closed
          properties:
            all:
              type: integer
            open:
              type: integer
              description: Tickets with status open or in_progress
            closed:
              type: integer
              description: Tickets with status fixed, wont_fix, or closed
        by_status:
          type: object
          additionalProperties:
            type: integer
          description: Count per status value
          examples:
            value:
              open: 15
              in_progress: 8
              fixed: 42
              wont_fix: 3
              closed: 12
              blocked: 2
        by_severity:
          type: object
          additionalProperties:
            type: integer
          description: Count per severity level
          examples:
            value:
              critical: 2
              high: 10
              medium: 35
              low: 25
              info: 10
        by_category:
          type: object
          additionalProperties:
            type: integer
          description: Count per category
          examples:
            value:
              crash: 8
              hotfix: 5
              feature: 22
              security: 12
              general: 35
        by_repo:
          type:
          - object
          - 'null'
          additionalProperties:
            type: integer
          description: Count per repository (only when --by-repo flag used)
        date_range:
          type:
          - object
          - 'null'
          properties:
            earliest:
              type: string
              format: date-time
            latest:
              type: string
              format: date-time
    HealthResponse:
      type: object
      description: System health status
      required:
      - status
      - version
      - index_status
      properties:
        status:
          type: string
          enum:
          - healthy
          - degraded
          - unhealthy
          description: Overall system health
        version:
          type: string
          examples:
            value: 0.1.0
        uptime_seconds:
          type:
          - integer
          - 'null'
          description: Server uptime in seconds
        index_status:
          type: object
          properties:
            zvec:
              type: string
              enum:
              - available
              - unavailable
              - corrupted
            ticket_count:
              type: integer
            last_reindex:
              type:
              - string
              - 'null'
              format: date-time
        embedding_provider:
          type:
          - object
          - 'null'
          properties:
            name:
              type: string
              enum:
              - local
              - openai
              - custom
              - none
            model:
              type:
              - string
              - 'null'
              examples:
                value: all-MiniLM-L6-v2
            dimension:
              type:
              - integer
              - 'null'
    ReindexResult:
      type: object
      description: Result of a reindex operation
      required:
      - processed
      - skipped
      - failed
      - duration_ms
      properties:
        processed:
          type: integer
          description: Tickets that were (re-)embedded and indexed
        skipped:
          type: integer
          description: Tickets unchanged since last index
        failed:
          type: integer
          description: Tickets that failed to index
        duration_ms:
          type: integer
          description: Total reindex duration
        errors:
          type: array
          items:
            type: object
            properties:
              ticket_id:
                type: string
              message:
                type: string
    DoctorResult:
      type: object
      description: Diagnostic check results
      required:
      - checks
      - overall
      properties:
        overall:
          type: string
          enum:
          - ok
          - warnings
          - errors
        checks:
          type: array
          items:
            type: object
            required:
            - name
            - status
            properties:
              name:
                type: string
                examples:
                  value: zvec_index
              status:
                type: string
                enum:
                - ok
                - warning
                - error
              message:
                type:
                - string
                - 'null'
              fix:
                type:
                - string
                - 'null'
                description: Suggested fix command
    BulkCreateRequest:
      type: object
      description: Batch ticket creation
      required:
      - tickets
      properties:
        tickets:
          type: array
          items:
            $ref: '#/components/schemas/TicketCreate'
          minItems: 1
          maxItems: 500
          description: Tickets to create
        dry_run:
          type: boolean
          default: false
          description: Preview without writing
    BulkOperationResult:
      type: object
      description: Result of a bulk operation
      required:
      - total
      - succeeded
      - failed
      properties:
        total:
          type: integer
        succeeded:
          type: integer
        failed:
          type: integer
        results:
          type: array
          items:
            type: object
            properties:
              index:
                type: integer
              ticket_id:
                type:
                - string
                - 'null'
              status:
                type: string
                enum:
                - created
                - updated
                - deleted
                - error
              error:
                type:
                - string
                - 'null'
    BulkUpdateRequest:
      type: object
      description: Batch ticket update
      required:
      - filters
      - changes
      properties:
        filters:
          $ref: '#/components/schemas/FilterSet'
        changes:
          $ref: '#/components/schemas/TicketUpdate'
        dry_run:
          type: boolean
          default: false
    BulkDeleteRequest:
      type: object
      description: Batch ticket deletion
      required:
      - filters
      properties:
        filters:
          $ref: '#/components/schemas/FilterSet'
        force:
          type: boolean
          default: false
          description: Hard delete (skip trash)
        dry_run:
          type: boolean
          default: false
    ImportRequest:
      type: object
      description: Import tickets from file or service
      properties:
        source:
          type: string
          enum:
          - json
          - csv
          - markdown
          - github
          - jira
          description: Import source format
        data:
          type:
          - string
          - 'null'
          description: Inline data (for small imports)
        url:
          type:
          - string
          - 'null'
          description: URL to import file
        repo_mapping:
          type:
          - object
          - 'null'
          additionalProperties:
            type: string
          description: Map external repo names to vtic repo format
        preserve_ids:
          type: boolean
          default: false
          description: Keep original IDs if possible
        dry_run:
          type: boolean
          default: false
    ImportResult:
      type: object
      description: Import operation result
      required:
      - total
      - imported
      - skipped
      - failed
      properties:
        total:
          type: integer
        imported:
          type: integer
        skipped:
          type: integer
          description: Duplicates detected
        failed:
          type: integer
        id_mapping:
          type:
          - object
          - 'null'
          additionalProperties:
            type: string
          description: Old ID → new ID mapping
    ExportOptions:
      type: object
      description: Export configuration
      properties:
        format:
          type: string
          enum:
          - json
          - jsonl
          - csv
          - markdown
          - tar.gz
          default: json
        filters:
          $ref: '#/components/schemas/FilterSet'
    WebhookPayload:
      type: object
      description: Payload sent to webhook endpoints
      required:
      - event
      - ticket
      - timestamp
      properties:
        event:
          type: string
          enum:
          - ticket.created
          - ticket.updated
          - ticket.deleted
          description: Event type that triggered the webhook
        ticket:
          $ref: '#/components/schemas/Ticket'
        previous:
          type:
          - object
          - 'null'
          description: Previous ticket state (for update events only)
          properties:
            title:
              type:
              - string
              - 'null'
            status:
              type:
              - string
              - 'null'
            severity:
              type:
              - string
              - 'null'
        timestamp:
          type: string
          format: date-time
        signature:
          type:
          - string
          - 'null'
          description: HMAC-SHA256 signature for verification
    ConfigResponse:
      type: object
      description: Current configuration
      properties:
        storage:
          type: object
          properties:
            dir:
              type: string
              examples:
                value: ./tickets
        search:
          type: object
          properties:
            bm25_enabled:
              type: boolean
            semantic_enabled:
              type: boolean
            bm25_weight:
              type: number
            semantic_weight:
              type: number
        embeddings:
          type: object
          properties:
            provider:
              type: string
              enum:
              - local
              - openai
              - custom
              - none
            model:
              type:
              - string
              - 'null'
            dimension:
              type:
              - integer
              - 'null'
        api:
          type: object
          properties:
            host:
              type: string
            port:
              type: integer
  parameters:
    ticketIdParam:
      name: ticket_id
      in: path
      required: true
      schema:
        type: string
        pattern: ^[CFGHST]\d+$
        examples:
          value: C1
      description: Ticket identifier (category prefix + number)
    limitParam:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
      description: Max results per page
    offsetParam:
      name: offset
      in: query
      schema:
        type: integer
        minimum: 0
        default: 0
      description: Pagination offset
    formatParam:
      name: format
      in: query
      schema:
        type: string
        enum:
        - json
        - markdown
        - yaml
        - csv
        default: json
      description: Response format
    sortParam:
      name: sort
      in: query
      schema:
        type: string
        default: -created
        pattern: ^-?[a-zA-Z_]+$
      description: 'Sort field (prefix - for desc): created, updated, severity, title'
    repoFilter:
      name: repo
      in: query
      schema:
        type: array
        items:
          type: string
      style: form
    severityFilter:
      name: severity
      in: query
      schema:
        type: array
        items:
          $ref: '#/components/schemas/Severity'
      style: form
      explode: false
      description: Filter by severity levels
    statusFilter:
      name: status
      in: query
      schema:
        type: array
        items:
          $ref: '#/components/schemas/Status'
      style: form
      explode: false
      description: Filter by status values
    categoryFilter:
      name: category
      in: query
      schema:
        type: array
        items:
          $ref: '#/components/schemas/Category'
      style: form
      explode: false
      description: Filter by category
    explainParam:
      name: explain
      in: query
      schema:
        type: boolean
        default: false
      description: Show scoring breakdown per result
    dryRunParam:
      name: dry_run
      in: query
      schema:
        type: boolean
        default: false
      description: Preview changes without writing
  webhooks:
    ticket.created:
      post:
        operationId: webhookTicketCreated
        summary: Ticket created
        description: Fired when a new ticket is created
        tags:
        - Webhooks
        requestBody:
          required: true
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookPayload'
        responses:
          '200':
            description: Webhook received successfully
          '204':
            description: Acknowledged without response
    ticket.updated:
      post:
        operationId: webhookTicketUpdated
        summary: Ticket updated
        description: Fired when a ticket is modified
        tags:
        - Webhooks
        requestBody:
          required: true
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookPayload'
        responses:
          '200':
            description: Webhook received successfully
    ticket.deleted:
      post:
        operationId: webhookTicketDeleted
        summary: Ticket deleted
        description: Fired when a ticket is deleted (soft or hard)
        tags:
        - Webhooks
        requestBody:
          required: true
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookPayload'
        responses:
          '200':
            description: Webhook received successfully
