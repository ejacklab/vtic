# Stage 2: Search Operations
# Canonical reference extracted from openapi.yaml

paths:
  /search:
    post:
      tags: [Search]
      summary: Hybrid search for tickets
      operationId: searchTickets
      parameters:
        - $ref: '#/components/parameters/explainParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SearchQuery'
      responses:
        '200':
          description: Search completed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchResult'
        '400':
          description: Invalid request - empty or missing query
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: Semantic search requested but no embedding provider configured
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /search/suggest:
    get:
      tags: [Search]
      summary: Get auto-complete suggestions
      operationId: suggestSearch
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
            minLength: 2
            maxLength: 100
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 20
            default: 5
      responses:
        '200':
          description: Suggestions retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SuggestionItem'

components:
  parameters:
    explainParam:
      name: explain
      in: query
      schema:
        type: boolean
        default: false
      description: Show scoring breakdown per result

  schemas:
    SearchQuery:
      type: object
      required: [query]
      properties:
        query:
          type: string
          minLength: 1
          maxLength: 500
        semantic:
          type: boolean
          default: false
        filters:
          $ref: '#/components/schemas/FilterSet'
        limit:
          type: integer
          minimum: 1
          maximum: 100
          default: 20
        offset:
          type: integer
          minimum: 0
          default: 0
        sort:
          type: string
          default: -score
          enum: [score, -score, created, -created, updated, -updated, severity, -severity]
        min_score:
          type: [number, 'null']
          format: float
          minimum: 0
          maximum: 1
          default: 0.0

    FilterSet:
      type: object
      properties:
        severity:
          type: [array, 'null']
          items:
            $ref: '#/components/schemas/Severity'
        status:
          type: [array, 'null']
          items:
            $ref: '#/components/schemas/Status'
        repo:
          type: [array, 'null']
          items:
            type: string
        category:
          type: [array, 'null']
          items:
            $ref: '#/components/schemas/Category'
        assignee:
          type: [string, 'null']
        tags:
          type: [array, 'null']
          items:
            type: string
        created_after:
          type: [string, 'null']
          format: date-time
        created_before:
          type: [string, 'null']
          format: date-time
        updated_after:
          type: [string, 'null']
          format: date-time

    SearchHit:
      type: object
      required: [ticket_id, score, source]
      properties:
        ticket_id:
          type: string
        score:
          type: number
          format: double
          minimum: 0
        source:
          type: string
          enum: [bm25, semantic, hybrid]
        bm25_score:
          type: [number, 'null']
          format: double
        semantic_score:
          type: [number, 'null']
          format: double
        highlight:
          type: [string, 'null']

    SearchResult:
      type: object
      required: [query, hits, total]
      properties:
        query:
          type: string
        hits:
          type: array
          items:
            $ref: '#/components/schemas/SearchHit'
        total:
          type: integer
        meta:
          type: object
          properties:
            bm25_weight:
              type: number
            semantic_weight:
              type: number
            latency_ms:
              type: integer
            semantic_used:
              type: boolean
            request_id:
              type: string
        request_id:
          type: string

    SuggestionItem:
      type: object
      required: [suggestion, ticket_count]
      properties:
        suggestion:
          type: string
        ticket_count:
          type: integer

    Severity:
      type: string
      enum: [critical, high, medium, low, info]

    Status:
      type: string
      enum: [open, in_progress, blocked, fixed, wont_fix, closed]

    Category:
      type: string
      enum: [crash, hotfix, feature, security, general]

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              enum: [VALIDATION_ERROR, NOT_FOUND, CONFLICT, PAYLOAD_TOO_LARGE, INTERNAL_ERROR, SERVICE_UNAVAILABLE]
            message:
              type: string
            details:
              type: array
              items:
                type: object
                properties:
                  field:
                    type: string
                  message:
                    type: string
                  value:
                    type: [string, 'null']
            docs:
              type: [string, 'null']
