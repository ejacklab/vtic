# Stage 1: Foundation - Health, Config, Diagnostics
# Canonical reference extracted from openapi.yaml

paths:
  /health:
    get:
      tags: [System]
      summary: Health check endpoint
      operationId: getHealth
      security: []
      responses:
        '200':
          description: System health status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /config:
    get:
      tags: [Management]
      summary: Get configuration
      operationId: getConfig
      responses:
        '200':
          description: Current configuration
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfigResponse'
    patch:
      tags: [Management]
      summary: Update configuration
      operationId: updateConfig
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConfigUpdate'
      responses:
        '200':
          description: Updated configuration
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfigResponse'

  /doctor:
    get:
      tags: [Management]
      summary: Run diagnostic checks
      operationId: runDiagnostics
      responses:
        '200':
          description: Diagnostic results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DoctorResult'

  /openapi.json:
    get:
      tags: [System]
      summary: OpenAPI specification
      operationId: getOpenApiSpec
      security: []
      responses:
        '200':
          description: OpenAPI specification in JSON format

components:
  schemas:
    HealthResponse:
      type: object
      required: [status, version, index_status]
      properties:
        status:
          type: string
          enum: [healthy, degraded, unhealthy]
        version:
          type: string
        uptime_seconds:
          type: [integer, 'null']
        index_status:
          type: object
          properties:
            zvec:
              type: string
              enum: [available, unavailable, corrupted]
            ticket_count:
              type: integer
            last_reindex:
              type: [string, 'null']
              format: date-time
        embedding_provider:
          type: [object, 'null']
          properties:
            name:
              $ref: '#/components/schemas/EmbeddingProvider'
            model:
              type: [string, 'null']
            dimension:
              type: [integer, 'null']

    ConfigResponse:
      type: object
      properties:
        storage:
          type: object
          properties:
            dir:
              type: string
              example: ./tickets
        search:
          type: object
          properties:
            bm25_enabled:
              type: boolean
            semantic_enabled:
              type: boolean
            bm25_weight:
              type: number
            semantic_weight:
              type: number
        embeddings:
          type: object
          properties:
            provider:
              $ref: '#/components/schemas/EmbeddingProvider'
            model:
              type: [string, 'null']
            dimension:
              type: [integer, 'null']
        api:
          type: object
          properties:
            host:
              type: string
            port:
              type: integer

    ConfigUpdate:
      type: object
      properties:
        storage:
          type: object
          properties:
            dir:
              type: string
        search:
          type: object
          properties:
            bm25_enabled:
              type: boolean
            semantic_enabled:
              type: boolean
            bm25_weight:
              type: number
              minimum: 0
              maximum: 1
            semantic_weight:
              type: number
              minimum: 0
              maximum: 1
        embeddings:
          type: object
          properties:
            provider:
              $ref: '#/components/schemas/EmbeddingProvider'
            model:
              type: [string, 'null']
            dimension:
              type: [integer, 'null']
        api:
          type: object
          properties:
            host:
              type: string
            port:
              type: integer
              minimum: 1
              maximum: 65535

    DoctorResult:
      type: object
      required: [checks, overall]
      properties:
        overall:
          type: string
          enum: [ok, warnings, errors]
        checks:
          type: array
          items:
            type: object
            required: [name, status]
            properties:
              name:
                type: string
              status:
                type: string
                enum: [ok, warning, error]
              message:
                type: [string, 'null']
              fix:
                type: [string, 'null']

    EmbeddingProvider:
      type: string
      enum: [local, openai, custom, none]
